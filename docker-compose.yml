services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: changetracker-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:4-management
    container_name: changetracker-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

volumes:
  sqlserver-data:
  rabbitmq-data:
